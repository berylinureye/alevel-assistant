services:
  # ── 后端 API ──
  - type: web
    name: alevel-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # Render 会提示你手动填写
      - key: ANTHROPIC_BASE_URL
        value: https://api.viviai.cc
      - key: BASE_MODEL
        value: gemini-2.5-flash
      - key: VISION_MODEL
        value: gemini-2.5-flash
      - key: REVIEW_MODEL
        value: gemini-3-pro-preview
      - key: PREPARE_UPLOAD_TIMEOUT_SECONDS
        value: "15"
      - key: FAST_BATCH_RECOGNITION_TIMEOUT_SECONDS
        value: "15"
      - key: FAST_BATCH_PREPARE_TIMEOUT_SECONDS
        value: "15"
      - key: FAST_BATCH_IMAGE_MAX_DIMENSION
        value: "1600"
      - key: FAST_BATCH_QUESTION_TIMEOUT_SECONDS
        value: "15"
      - key: FAST_BATCH_AFTER_FIRST_QUESTION_TIMEOUT_SECONDS
        value: "8"
      - key: FAST_BATCH_TIMEOUT_GRACE_SECONDS
        value: "2"
      - key: ALLOWED_ORIGINS
        value: https://alevel-app.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.11"

  # ── 前端静态站 ──
  - type: web
    name: alevel-app
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://alevel-api.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
