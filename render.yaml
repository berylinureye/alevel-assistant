services:
  # ── 后端 API ──
  - type: web
    name: alevel-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # Render 会提示你手动填写
      - key: ANTHROPIC_BASE_URL
        value: https://api.viviai.cc
      - key: BASE_MODEL
        value: gemini-3-flash-preview
      - key: REVIEW_MODEL
        value: gemini-3-pro-preview
      - key: ALLOWED_ORIGINS
        value: https://alevel-app.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.11"

  # ── 前端静态站 ──
  - type: web
    name: alevel-app
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://alevel-api.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
